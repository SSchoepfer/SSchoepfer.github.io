---
layout: default
title: Albums
permalink: /albums/
---

<style>
  .albums {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
  }

  .album {
    cursor: pointer;
    text-align: center;
  }

  .album img {
    width: 100%;
    border-radius: 8px;
  }

  .album h3 {
    margin-top: 8px;
    font-size: 1rem;
    color: #333;
  }
</style>

<div class="albums">
  {% assign albums = site.data.tracks.tracks | group_by: "album" %}
  {% for album in albums %}
    {% assign first = album.items[0] %}
    <div class="album" onclick="openAlbum('{{ album.name | uri_escape }}')">
      <img src="{{ first.cover }}" alt="{{ album.name }} cover" />
      <h3>{{ album.name }}</h3>
    </div>
  {% endfor %}
</div>

<script>
  // Redirect to Player2.html with album query param
  function openAlbum(albumName) {
    window.location.href = "/player2.html?album=" + albumName;
  }
</script>
